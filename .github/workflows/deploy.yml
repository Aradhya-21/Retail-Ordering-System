# ============================================================
# GitHub Actions — Deploy
# Builds Docker images → GHCR → deploys via SSH
#
# Staging:  automatic on push to main
# Production: manual (workflow_dispatch) or on version tag
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/retail-ordering-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/retail-ordering-frontend

jobs:
  # ── Build & Push Docker Images ────────────────────────────
  package:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_API }}
            ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: RetailOrdering.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: retail-ordering-frontend
          file: retail-ordering-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to Staging ─────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging
      url: http://${{ vars.STAGING_HOST }}
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.STAGING_HOST }}
          username: ${{ vars.STAGING_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE_API }}:${{ github.sha }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            export TAG=${{ github.sha }}
            export IMAGE_API=${{ env.IMAGE_API }}
            export IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}

            docker compose -f /opt/retail-ordering/docker-compose.yml \
              --env-file /opt/retail-ordering/.env.staging \
              up -d --no-build

  # ── Deploy to Production ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: production
      url: https://${{ vars.PROD_HOST }}
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: ${{ vars.PROD_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE_API }}:${{ github.sha }}
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            export TAG=${{ github.sha }}
            export IMAGE_API=${{ env.IMAGE_API }}
            export IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}

            docker compose -f /opt/retail-ordering/docker-compose.yml \
              --env-file /opt/retail-ordering/.env.prod \
              up -d --no-build
